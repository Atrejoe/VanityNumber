apiVersion: apps/v1
kind: Deployment
metadata:
  name: vanity-robertsirre-nl
  namespace: vanity-robertsirre-nl
  labels:
    app: vanity-robertsirre-nl
    component: api
spec:
  replicas: 4
  selector:
    matchLabels:
      app: vanity-robertsirre-nl
      component: api
  template:
    metadata:
      labels:
        app: vanity-robertsirre-nl
        component: api
    spec:
      containers:
      - name: api
        image: atreyu/naamnummer.api:0.0.1
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        # Sentry Configuration - DSN from Secret (optional)
        - name: Sentry__Dsn
          valueFrom:
            secretKeyRef:
              name: vanity-sentry-secrets
              key: api-dsn
              optional: true  # Don't fail if secret is missing or empty
        
        # Sentry Configuration - Settings from ConfigMap (optional)
        - name: Sentry__Environment
          valueFrom:
            configMapKeyRef:
              name: vanity-sentry-config
              key: api-environment
              optional: true
        
        - name: Sentry__TracesSampleRate
          valueFrom:
            configMapKeyRef:
              name: vanity-sentry-config
              key: api-traces-sample-rate
              optional: true
        
        - name: Sentry__SendDefaultPii
          valueFrom:
            configMapKeyRef:
              name: vanity-sentry-config
              key: api-send-default-pii
              optional: true
        
        - name: Sentry__Debug
          valueFrom:
            configMapKeyRef:
              name: vanity-sentry-config
              key: api-debug
              optional: true
        
        - name: Sentry__AttachStacktrace
          valueFrom:
            configMapKeyRef:
              name: vanity-sentry-config
              key: api-attach-stacktrace
              optional: true
        
        - name: Sentry__MaxBreadcrumbs
          valueFrom:
            configMapKeyRef:
              name: vanity-sentry-config
              key: api-max-breadcrumbs
              optional: true
        
        # Uncomment for development/debugging
        # - name: ASPNETCORE_ENVIRONMENT
        #   value: "Development"
        # - name: ASPNETCORE_URLS
        #   value: "http://0.0.0.0:5000/"
        
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            memory: "128Mi"
            cpu: "100m"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: vanity-robertsirre-nl
                  component: api
              topologyKey: kubernetes.io/hostname
