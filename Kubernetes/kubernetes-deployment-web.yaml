apiVersion: apps/v1
kind: Deployment
metadata:
  name: vanity-robertsirre-nl-web
  namespace: vanity-robertsirre-nl
  labels:
    app: vanity-robertsirre-nl
    component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vanity-robertsirre-nl
      component: web
  template:
    metadata:
      labels:
        app: vanity-robertsirre-nl
        component: web
    spec:
      containers:
      - name: web
        image: atreyu/vanitynumber.web:0.3.1
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: API_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: vanity-config
              key: API_BASE_URL
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            memory: "64Mi"
            cpu: "50m"
        securityContext:
          runAsNonRoot: true
          runAsUser: 101 # nginx user in alpine
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: vanity-robertsirre-nl
                  component: web
              topologyKey: kubernetes.io/hostname
