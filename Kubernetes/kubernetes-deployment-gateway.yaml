apiVersion: apps/v1
kind: Deployment
metadata:
  name: vanity-robertsirre-nl-gateway
  namespace: vanity-robertsirre-nl
  labels:
    app: vanity-robertsirre-nl
    component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vanity-robertsirre-nl
      component: gateway
  template:
    metadata:
      labels:
        app: vanity-robertsirre-nl
        component: gateway
    spec:
      containers:
      - name: gateway
        image: atreyu/vanitynumber.gateway:0.1.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: API_BACKEND_URL
          value: "vanity-robertsirre-nl-api:8080"
        - name: WEB_BACKEND_URL
          value: "vanity-robertsirre-nl-web:8080"
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            memory: "32Mi"
            cpu: "25m"
        securityContext:
          runAsNonRoot: true
          runAsUser: 101 # nginx user in alpine
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: vanity-robertsirre-nl
                  component: gateway
              topologyKey: kubernetes.io/hostname
