events {
	worker_connections 1024;
}

http {
	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	# Run as non-root user
	# PID file location accessible to nginx user
	pid /var/run/nginx.pid;

	# Logging
	access_log /var/log/nginx/access.log;
	error_log /var/log/nginx/error.log;

	# Performance
	sendfile on;
	tcp_nopush on;
	tcp_nodelay on;
	keepalive_timeout 65;
	types_hash_max_size 2048;

	# Gzip compression
	gzip on;
	gzip_vary on;
	gzip_proxied any;
	gzip_comp_level 6;
	gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/wasm;

	server {
		listen 8080;
		server_name _;
		root /usr/share/nginx/html;
		index index.html;

		# Enable Blazor WebAssembly specific headers
		location / {
			try_files $uri $uri/ /index.html;
			
			# CORS headers if needed
			add_header 'Access-Control-Allow-Origin' '*' always;
			add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
			add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
		}

		# Blazor framework files need special MIME types
		location ~ \.dll$ {
			types { }
			default_type application/octet-stream;
		}

		location ~ \.wasm$ {
			types { }
			default_type application/wasm;
		}

		location ~ \.json$ {
			types { }
			default_type application/json;
		}

		# Cache static assets
		location ~* \.(jpg|jpeg|png|gif|ico|css|js|wasm|dll)$ {
			expires 1y;
			add_header Cache-Control "public, immutable";
		}

		# Health check endpoint
		location /health {
			access_log off;
			return 200 "healthy\n";
			add_header Content-Type text/plain;
		}
	}
}
