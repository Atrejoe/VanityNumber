# Run as non-root user
# PID file location accessible to nginx user
pid /var/run/nginx.pid;

events {
	worker_connections 1024;
}

http {
	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	# Logging
	access_log /var/log/nginx/access.log;
	error_log /var/log/nginx/error.log warn;

	# Performance
	sendfile on;
	tcp_nopush on;
	tcp_nodelay on;
	keepalive_timeout 65;
	types_hash_max_size 2048;
	client_max_body_size 10M;

	# Gzip compression for text-based files
	gzip on;
	gzip_vary on;
	gzip_proxied any;
	gzip_comp_level 6;
	gzip_min_length 256;
	gzip_types
		text/plain
		text/css
		text/xml
		text/javascript
		application/json
		application/javascript
		application/xml+rss
		application/xml
		application/wasm
		application/octet-stream;

	server {
		listen 8080;
		server_name _;
		root /usr/share/nginx/html;
		index index.html;

		# HTML files - no cache, always revalidate (for Cloudflare)
		location ~* \.html$ {
			try_files $uri /index.html;
			
			# Force no caching for HTML files
			add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
			add_header Pragma "no-cache" always;
			add_header Expires "0" always;
			
			# Cloudflare-specific headers
			add_header CF-Cache-Status "BYPASS" always;
			
			# Security headers
			add_header X-Content-Type-Options "nosniff" always;
			add_header X-Frame-Options "SAMEORIGIN" always;
			add_header X-XSS-Protection "1; mode=block" always;
		}

		# Blazor WebAssembly routing - all routes should serve index.html
		location / {
			try_files $uri $uri/ /index.html =404;

			# Don't cache index.html
			add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
			add_header Pragma "no-cache" always;
			
			# Security headers
			add_header X-Content-Type-Options "nosniff" always;
			add_header X-Frame-Options "SAMEORIGIN" always;
			add_header X-XSS-Protection "1; mode=block" always;
			add_header Referrer-Policy "strict-origin-when-cross-origin" always;

			# CORS headers (adjust as needed for your API)
			add_header Access-Control-Allow-Origin '*' always;
			add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS, PUT, DELETE' always;
			add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
			add_header Access-Control-Expose-Headers 'Content-Length,Content-Range' always;

			# Handle preflight requests
			if ($request_method = 'OPTIONS') {
				add_header Access-Control-Allow-Origin '*';
				add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS, PUT, DELETE';
				add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
				add_header Access-Control-Max-Age 1728000;
				add_header Content-Type 'text/plain; charset=utf-8';
				add_header Content-Length 0;
				return 204;
			}
		}

		# Blazor framework files - critical for app to work
		# These have fingerprinted names so can be cached forever
		location /_framework/ {
			# Serve pre-compressed .br files if they exist
			location ~ \.br$ {
				gzip off;
				types {}
				default_type application/octet-stream;
				add_header Content-Encoding br;
				add_header Cache-Control "public, max-age=31536000, immutable" always;
				add_header Vary "Accept-Encoding" always;
			}

			# Serve pre-compressed .gz files if they exist
			location ~ \.gz$ {
				gzip off;
				types {}
				default_type application/octet-stream;
				add_header Content-Encoding gzip;
				add_header Cache-Control "public, max-age=31536000, immutable" always;
				add_header Vary "Accept-Encoding" always;
			}

			# WASM files
			location ~ \.wasm$ {
				types {}
				default_type application/wasm;
				add_header Cache-Control "public, max-age=31536000, immutable" always;
			}

			# DLL files
			location ~ \.dll$ {
				types {}
				default_type application/octet-stream;
				add_header Cache-Control "public, max-age=31536000, immutable" always;
			}

			# DAT files (ICU data)
			location ~ \.dat$ {
				types {}
				default_type application/octet-stream;
				add_header Cache-Control "public, max-age=31536000, immutable" always;
			}

			# JSON files (blazor.boot.json, etc.)
			location ~ \.json$ {
				types {}
				default_type application/json;
				# Boot JSON should be revalidated but can be cached
				add_header Cache-Control "public, max-age=3600, must-revalidate" always;
			}

			# JavaScript files
			location ~ \.js$ {
				types {}
				default_type text/javascript;
				add_header Cache-Control "public, max-age=31536000, immutable" always;
			}

			# Default for other framework files
			add_header Cache-Control "public, max-age=31536000, immutable" always;
		}

		# Service Worker - must not be cached (but query string versioning allows CDN cache)
		location = /service-worker.js {
			types {}
			default_type text/javascript;
			
			# Allow caching if versioned with query string
			if ($args ~* "v=") {
				add_header Cache-Control "public, max-age=3600, must-revalidate" always;
			}
			
			# No cache if no version
			if ($args !~* "v=") {
				add_header Cache-Control "public, max-age=0, must-revalidate" always;
			}
			
			add_header Service-Worker-Allowed "/" always;
		}

		# Manifest for PWA - cache with query string version
		location = /manifest.json {
			types {}
			default_type application/json;
			
			# Allow caching if versioned
			if ($args ~* "v=") {
				add_header Cache-Control "public, max-age=86400" always;
			}
			
			# Short cache if no version
			if ($args !~* "v=") {
				add_header Cache-Control "public, max-age=3600, must-revalidate" always;
			}
		}

		# Custom CSS/JS files with query string versioning
		location ~* \.(css|js)$ {
			# If has version query string, cache for long time
			if ($args ~* "v=") {
				add_header Cache-Control "public, max-age=31536000, immutable" always;
			}
			
			# Without version, shorter cache with revalidation
			if ($args !~* "v=") {
				add_header Cache-Control "public, max-age=3600, must-revalidate" always;
			}
		}

		# Icons and images - cache based on query string
		location ~* \.(png|jpg|jpeg|gif|ico|svg)$ {
			# With version query string
			if ($args ~* "v=") {
				add_header Cache-Control "public, max-age=31536000, immutable" always;
			}
			
			# Without version - shorter cache
			if ($args !~* "v=") {
				add_header Cache-Control "public, max-age=86400" always;
			}
		}

		# Health check endpoint
		location /health {
			access_log off;
			return 200 "healthy\n";
			add_header Content-Type text/plain;
			add_header Cache-Control "no-store" always;
		}

		# Deny access to hidden files
		location ~ /\. {
			deny all;
			access_log off;
			log_not_found off;
		}
	}
}
