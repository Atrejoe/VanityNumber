<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Transform your phone number into memorable vanity numbers using dictionary words" />
    <meta name="theme-color" content="#667eea" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vanity Numbers" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Vanity Numbers" />
    
    <title>Vanity Number Generator</title>
    <base href="/" />
    
    <!-- Cache busting version -->
    <meta name="build-version" content="{{BUILD_VERSION}}" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json?v={{BUILD_VERSION}}" />
    
    <!-- Favicons - Multi-resolution -->
    <link rel="icon" type="image/png" sizes="16x16" href="icon-16x16.png?v={{BUILD_VERSION}}" />
    <link rel="icon" type="image/png" sizes="32x32" href="icon-32x32.png?v={{BUILD_VERSION}}" />
    <link rel="icon" type="image/png" sizes="48x48" href="icon-48x48.png?v={{BUILD_VERSION}}" />
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192x192.png?v={{BUILD_VERSION}}" />
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512x512.png?v={{BUILD_VERSION}}" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="icon-192x192.png?v={{BUILD_VERSION}}" />
    <link rel="apple-touch-icon" sizes="167x167" href="icon-192x192.png?v={{BUILD_VERSION}}" />
    <link rel="apple-touch-icon" sizes="152x152" href="icon-192x192.png?v={{BUILD_VERSION}}" />
    <link rel="apple-touch-icon" sizes="120x120" href="icon-128x128.png?v={{BUILD_VERSION}}" />
    
    <!-- Stylesheets with cache busting -->
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css?v={{BUILD_VERSION}}" />
    <link href="VanityNumber.Web.styles.css?v={{BUILD_VERSION}}" rel="stylesheet" />
    
    <!-- Theme Manager - Load early for no flash -->
    <script src="js/theme-manager.js?v={{BUILD_VERSION}}" type="module"></script>
    
    <!-- Contact Picker API -->
    <script src="js/contactPicker.js?v={{BUILD_VERSION}}"></script>
    
    <script type="importmap"></script>
    
    <style>
        /* Loading screen styles - inline for fast rendering */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        #loading-screen::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 107, 237, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(59, 130, 246, 0.3) 0%, transparent 50%);
            pointer-events: none;
        }

        .loading-content {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1.5rem;
        }

        .loading-text {
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Fade out loading screen when Blazor loads */
        body.blazor-loaded #loading-screen {
            opacity: 0;
            pointer-events: none;
        }

        /* Dark mode loading screen */
        body[data-theme="dark"] #loading-screen {
            background: linear-gradient(135deg, #1e1e2e 0%, #2d1b3d 100%);
        }

        body[data-theme="dark"] #loading-screen::before {
            background: 
                radial-gradient(circle at 20% 50%, rgba(88, 86, 214, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 107, 237, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%);
        }

        @media (prefers-color-scheme: dark) {
            body:not([data-theme]) #loading-screen {
                background: linear-gradient(135deg, #1e1e2e 0%, #2d1b3d 100%);
            }

            body:not([data-theme]) #loading-screen::before {
                background: 
                    radial-gradient(circle at 20% 50%, rgba(88, 86, 214, 0.15) 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, rgba(255, 107, 237, 0.1) 0%, transparent 50%),
                    radial-gradient(circle at 40% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%);
            }
        }
    </style>
</head>

<body>
    <div id="loading-screen">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading Vanity Number Generator...</div>
        </div>
    </div>

    <div id="app"></div>

    <div id="blazor-error-ui">
        <span>An unhandled error has occurred.</span>
        <div>
            <a href="." class="reload">Reload</a>
            <button class="dismiss">🗙</button>
        </div>
    </div>

    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    
    <!-- Register Service Worker for PWA with cache busting -->
    <script>
        // Get build version for cache busting
        const buildVersion = document.querySelector('meta[name="build-version"]')?.content || Date.now();
        
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register(`/service-worker.js?v=${buildVersion}`)
                    .then(registration => {
                        console.log('Service Worker registered:', registration.scope);
                        
                        // Check for updates
                        registration.update();
                    })
                    .catch(error => {
                        console.log('Service Worker registration failed:', error);
                    });
            });
        }
    </script>
</body>

</html>
