<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Transform your phone number into memorable vanity numbers using dictionary words" />
    <title>Vanity Number Generator</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="VanityNumber.Web.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
            <div style="width: 60px; height: 60px; border: 4px solid #e5e7eb; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem;"></div>
            <div style="color: #6b7280; font-family: system-ui, -apple-system, sans-serif;">Loading...</div>
        </div>
        <style>
            @keyframes spin {
                to { transform: rotate(360deg); }
            }
        </style>
    </div>

    <div id="blazor-error-ui" style="background: #fee2e2; color: #991b1b; padding: 1rem; position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; display: none; align-items: center; justify-content: space-between;">
        <span>An unhandled error has occurred.</span>
        <div>
            <a href="." class="reload" style="color: #991b1b; text-decoration: underline; margin-right: 1rem;">Reload</a>
            <button class="dismiss" style="background: none; border: none; color: #991b1b; font-size: 1.5rem; cursor: pointer;">🗙</button>
        </div>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
