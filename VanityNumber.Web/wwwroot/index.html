<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Transform your phone number into memorable vanity numbers using dictionary words" />
    <meta name="theme-color" content="#667eea" />
    <title>Vanity Number Generator</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="VanityNumber.Web.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
    <style>
        /* Loading screen styles - inline for fast rendering */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        #loading-screen::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 107, 237, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(59, 130, 246, 0.3) 0%, transparent 50%);
            pointer-events: none;
        }

        .loading-content {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1.5rem;
        }

        .loading-text {
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Fade out loading screen when Blazor loads */
        body.blazor-loaded #loading-screen {
            opacity: 0;
            pointer-events: none;
        }

        @media (prefers-color-scheme: dark) {
            #loading-screen {
                background: linear-gradient(135deg, #1e1e2e 0%, #2d1b3d 100%);
            }

            #loading-screen::before {
                background: 
                    radial-gradient(circle at 20% 50%, rgba(88, 86, 214, 0.15) 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, rgba(255, 107, 237, 0.1) 0%, transparent 50%),
                    radial-gradient(circle at 40% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%);
            }
        }
    </style>
</head>

<body>
    <div id="loading-screen">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading Vanity Number Generator...</div>
        </div>
    </div>

    <div id="app"></div>

    <div id="blazor-error-ui">
        <span>An unhandled error has occurred.</span>
        <div>
            <a href="." class="reload">Reload</a>
            <button class="dismiss">🗙</button>
        </div>
    </div>

    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
