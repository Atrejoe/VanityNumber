name: Build, Test & Publish

# Runs on feature branches (everything except main) to build and publish
# preview images tagged with the branch name.
on:
  push:
    branches-ignore: [main]
  workflow_dispatch:

concurrency:
  group: build-test-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  checks: write   # dorny/test-reporter publishes a check run

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore .NET workloads (wasm-tools for Blazor WebAssembly)
        run: dotnet workload restore VanityNumber.sln

      - name: Restore
        run: dotnet restore VanityNumber.sln

      - name: Build
        run: dotnet build VanityNumber.sln --configuration Release --no-restore

      - name: Test
        run: >-
          dotnet test VanityNumber.sln
          --configuration Release
          --no-build
          --logger "trx"
          --results-directory ./TestResults
          --collect:"XPlat Code Coverage"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: ${{ !cancelled() }}
        with:
          name: Test results
          path: TestResults/**/*.trx
          reporter: dotnet-trx

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        if: ${{ !cancelled() }}
        with:
          reports: 'TestResults/*/coverage.cobertura.xml'
          targetdir: coverage-report
          reporttypes: 'Html;MarkdownSummaryGithub;Cobertura'

      - name: Add coverage to job summary
        if: ${{ !cancelled() }}
        run: cat coverage-report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test results & coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-and-coverage
          path: |
            TestResults/**/*.trx
            coverage-report/**
          if-no-files-found: ignore

  publish-images:
    name: Publish vanitynumber.${{ matrix.component }}
    needs: build-and-test
    runs-on: ubuntu-latest
    # Preview images are only published for non-main branches.
    if: github.ref_name != 'main'
    # Docker Hub publishing requires the DOCKERHUB_USERNAME and DOCKERHUB_TOKEN
    # repository secrets. DOCKERHUB_USERNAME is also the image namespace and
    # must match the images referenced in the Kubernetes manifests (atreyu).
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            dockerfile: VanityNumber.Api/Dockerfile
          - component: web
            dockerfile: VanityNumber.Web/Dockerfile
          - component: gateway
            dockerfile: gateway/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Docker Hub name (atreyu/vanitynumber.<component>) matches the
          # images referenced by the Kubernetes deployments.
          images: |
            ghcr.io/${{ github.repository_owner }}/vanitynumber.${{ matrix.component }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/vanitynumber.${{ matrix.component }}
          # Tag the image with the branch name (slashes become dashes, e.g.
          # feature/sentry -> feature-sentry).
          tags: |
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
